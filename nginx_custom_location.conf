location /questionari {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Scheme $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_http_version 1.1;

    proxy_pass http://prin-frontend:3000;
}

location = /counselorbot {
    return 301 /;
}

location ~ ^/counselorbot/(.*)$ {
    return 301 /$1;
}

location /api/term {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Scheme $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_http_version 1.1;

    proxy_pass http://counselorbot_backend:8000/term;
}

location / {

    # Dopo la verifica forward-auth, impostare questi header con valori ottenuti
    # dall'auth provider e un segreto uguale a FORWARD_AUTH_SHARED_SECRET nel backend:
    # proxy_set_header Remote-User $auth_user;
    # proxy_set_header Remote-Email $auth_email;
    # proxy_set_header Remote-Groups $auth_groups;
    # proxy_set_header X-Forwarded-Auth-Secret "SOSTITUIRE_CON_SEGRETO_LUNGO";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Scheme $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_http_version 1.1;

    proxy_read_timeout 600s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 600s;

    proxy_pass http://counselorbot_frontend:3000;
}
