server {
    listen 80;
    server_name counselorbot-sbs.ai4educ.org;

    # Upload PDF: app limita 10MB (QSA) / 100MB (pQBL); default nginx 1m causava
    # 413 + connessione chiusa -> "Failed to fetch" nel browser.
    client_max_body_size 100m;

    location = /internal/ai4auth/verify {
        internal;
        proxy_pass http://127.0.0.1:9091/api/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Original-URL https://$http_host$request_uri;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/term {
        # WebSocket connection directly to CounselorBot backend port 8088
        proxy_pass http://localhost:8088/term;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Timeout settings for active shell sessions
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {

        # ai4auth forward auth
        auth_request /internal/ai4auth/verify;
        error_page 401 =302 https://auth.ai4educ.org/login?rd=https://$http_host$request_uri;
        error_page 403 =302 https://portal.ai4educ.org;
        auth_request_set $a4_user $upstream_http_remote_user;
        auth_request_set $a4_email $upstream_http_remote_email;
        auth_request_set $a4_name $upstream_http_remote_name;
        auth_request_set $a4_groups $upstream_http_remote_groups;
        proxy_set_header Remote-User $a4_user;
        proxy_set_header Remote-Email $a4_email;
        proxy_set_header Remote-Name $a4_name;
        proxy_set_header Remote-Groups $a4_groups;
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Estrazione AI puo' superare 60s (default)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
    }
}
