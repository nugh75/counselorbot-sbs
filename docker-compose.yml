name: counselorbot-10-step
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: counselorbot_backend
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8088:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SESSION_MEMORY_DIR=/app/session_memory
      - AI4AUTH_VERIFY_URL=${AI4AUTH_VERIFY_URL:-http://ai4auth:9091/api/verify}
      - AI4AUTH_PUBLIC_HOST=${AI4AUTH_PUBLIC_HOST:-counselorbot-sbs.ai4educ.org}
      - ADMIN_GROUPS=${ADMIN_GROUPS:-admins,counselorbot-sbs-admin}
      - RAG_DOCS_DIR=/app/docs
      - RAG_INDEX_DIR=/app/rag_index
      - COUNSELORBOT_DOCS_DIR=/app/docs-counselorbot
      - QSA_OCR_MODEL=${QSA_OCR_MODEL:-glm-ocr:latest}
      - QSA_PARSER_MODEL=${QSA_PARSER_MODEL:-gemma4:e2b}
      - OPENCODE_WORKSPACE_ROOT=/opencode-workspaces
      - OPENCODE_WORKSPACE_HOST_ROOT=${OPENCODE_WORKSPACE_HOST_ROOT:-/home/nugh75/.cache/ai4educ-opencode}
      - AGENT_SOCKET=${AGENT_SOCKET:-/run/cloudflared-agent/agent.sock}
      - AGENT_PTY_SOCKET=${AGENT_PTY_SOCKET:-/run/cloudflared-agent/pty.sock}
      - OPENCODE_CHAT_MODEL=${OPENCODE_CHAT_MODEL:-gemma4:12b}
      - QSA_PDF_STORAGE_DIR=/app/uploads/qsa
      - RAG_DYNAMIC_COLLECTIONS_DIR=/app/rag-collections
    volumes:
      - ./session_memory:/app/session_memory
      - ./knowledge:/app/knowledge:ro
      # docs scrivibili: upload documenti RAG dal pannello admin
      - ./docs:/app/docs
      - ./docs-counselorbot:/app/docs-counselorbot
      - ./rag-collections:/app/rag-collections
      - rag_index:/app/rag_index
      - ./uploads:/app/uploads
      - /run/cloudflared-agent:/run/cloudflared-agent
      - /home/nugh75/.cache/ai4educ-opencode:/opencode-workspaces
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - default
      - proxy-network
      - auth-network

  postgres:
    image: postgres:15
    container_name: counselorbot_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: counselorbot_frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - default
      - proxy-network

volumes:
  postgres_data:
  rag_index:

networks:
  default:
  proxy-network:
    external: true
  auth-network:
    external: true
    name: ai4educ-console_default
