services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: counselorbot_backend
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - default
      - proxy-network

  postgres:
    image: postgres:15
    container_name: counselorbot_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: counselorbot_frontend
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - default
      - proxy-network

volumes:
  postgres_data:

networks:
  default:
  proxy-network:
    external: true
