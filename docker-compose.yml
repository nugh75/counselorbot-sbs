name: counselorbot-10-step
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: counselorbot_backend
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SESSION_MEMORY_DIR=/app/session_memory
      - AI4AUTH_VERIFY_URL=${AI4AUTH_VERIFY_URL:-http://ai4auth:9091/api/verify}
      - ADMIN_GROUPS=${ADMIN_GROUPS:-admins,counselorbot-sbs-admin}
    volumes:
      - ./session_memory:/app/session_memory
      - ./knowledge:/app/knowledge:ro
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - default
      - proxy-network
      - auth-network

  postgres:
    image: postgres:15
    container_name: counselorbot_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: counselorbot_frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - default
      - proxy-network

volumes:
  postgres_data:

networks:
  default:
  proxy-network:
    external: true
  auth-network:
    external: true
    name: ai4educ-console_default
